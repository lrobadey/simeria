<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sumer · First Light</title>
    <style>
      :root {
        --ink: #ece1cc;
        --ink-dim: #b8a888;
        --panel: rgba(22, 18, 13, 0.82);
        --edge: rgba(176, 138, 84, 0.45);
        --accent: #d8a85a;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(ellipse at 50% 30%, #2a221a 0%, #161009 70%);
        color: var(--ink);
        font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
      }

      main {
        position: relative;
        padding: 28px 0 40px;
        text-align: center;
      }

      h1 {
        margin: 0 0 2px;
        font-size: 26px;
        font-weight: 500;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: var(--accent);
        text-shadow: 0 0 24px rgba(216, 168, 90, 0.35);
      }

      h1 + p {
        margin: 0 0 16px;
        font-size: 13px;
        font-style: italic;
        color: var(--ink-dim);
        letter-spacing: 0.08em;
      }

      .stage {
        position: relative;
        display: inline-block;
        border-radius: 6px;
        box-shadow:
          0 0 0 1px var(--edge),
          0 0 60px rgba(0, 0, 0, 0.7),
          inset 0 0 120px rgba(0, 0, 0, 0.25);
      }

      canvas {
        display: block;
        border-radius: 6px;
      }

      .panel {
        position: absolute;
        padding: 10px 13px;
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 5px;
        font-size: 12.5px;
        line-height: 1.55;
        text-align: left;
        backdrop-filter: blur(3px);
        pointer-events: none;
      }

      #clock { top: 12px; right: 12px; min-width: 170px; }
      #clock .big { font-size: 19px; color: var(--accent); letter-spacing: 0.06em; }

      #agent-panel { bottom: 12px; left: 12px; min-width: 250px; }
      #eco-panel { top: 12px; left: 12px; }

      #tile-info {
        bottom: 12px;
        right: 12px;
        min-width: 170px;
        opacity: 0;
        transition: opacity 0.18s;
      }
      #tile-info.visible { opacity: 1; }

      #chronicle {
        position: absolute;
        left: calc(100% + 18px);
        top: 0;
        width: 250px;
        height: 100%;
        overflow: hidden;
        text-align: left;
        font-size: 12.5px;
        line-height: 1.5;
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      #chronicle .entry {
        padding: 7px 10px;
        background: var(--panel);
        border-left: 2px solid var(--edge);
        border-radius: 0 4px 4px 0;
        color: var(--ink-dim);
        animation: arrive 0.5s ease-out;
      }

      #chronicle .entry .when {
        display: block;
        font-size: 10.5px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        opacity: 0.6;
      }

      #chronicle .entry.milestone { color: var(--accent); border-left-color: var(--accent); }
      #chronicle .entry.kill { border-left-color: #a85a4a; }
      #chronicle .entry.agent { color: var(--ink); }

      @keyframes arrive {
        from { opacity: 0; transform: translateX(8px); }
        to { opacity: 1; transform: translateX(0); }
      }

      #controls {
        margin-top: 14px;
        display: flex;
        justify-content: center;
        gap: 8px;
        font-size: 12px;
      }

      #controls button {
        font-family: inherit;
        font-size: 12px;
        letter-spacing: 0.08em;
        padding: 6px 14px;
        background: var(--panel);
        color: var(--ink-dim);
        border: 1px solid var(--edge);
        border-radius: 4px;
        cursor: pointer;
      }

      #controls button:hover { color: var(--ink); }
      #controls button.active { color: var(--accent); border-color: var(--accent); }

      #controls .hint {
        align-self: center;
        color: var(--ink-dim);
        font-style: italic;
        opacity: 0.7;
        margin-left: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sumer</h1>
      <p>first light on the floodplain · one hour is one day</p>

      <div class="stage">
        <canvas id="world"></canvas>
        <div class="panel" id="clock"></div>
        <div class="panel" id="eco-panel"></div>
        <div class="panel" id="agent-panel"></div>
        <div class="panel" id="tile-info"></div>
        <div id="chronicle"></div>
      </div>

      <div id="controls">
        <button data-speed="1" class="active">1×</button>
        <button data-speed="12">12×</button>
        <button data-speed="60">60×</button>
        <button data-speed="240">240×</button>
        <button id="pause">Pause</button>
        <button id="track-adapa">Find Adapa</button>
        <span class="hint">hover the land to read it</span>
      </div>
    </main>

    <script src="js/core.js"></script>
    <script src="js/worldgen.js"></script>
    <script src="js/climate.js"></script>
    <script src="js/flora.js"></script>
    <script src="js/fauna.js"></script>
    <script src="js/agent.js"></script>
    <script src="js/render.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
