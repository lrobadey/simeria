<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sumer · First Light</title>
    <style>
      :root {
        --ink: #ece1cc;
        --ink-dim: #b8a888;
        --panel: rgba(22, 18, 13, 0.76);
        --edge: rgba(176, 138, 84, 0.4);
        --accent: #d8a85a;
        --gutter: clamp(8px, 1vw, 16px);
        --mind-width: clamp(210px, 16vw, 248px);
        --chronicle-width: clamp(220px, 18vw, 278px);
      }

      * { box-sizing: border-box; }

      html, body { width: 100%; height: 100%; overflow: hidden; }

      body {
        margin: 0;
        background:
          radial-gradient(ellipse at 50% 36%, rgba(61, 48, 35, 0.8) 0%, rgba(22, 16, 9, 0.96) 68%),
          #161009;
        color: var(--ink);
        font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
      }

      main {
        width: 100%;
        height: 100dvh;
        min-width: 0;
        min-height: 0;
        padding: var(--gutter);
        display: grid;
        grid-template-rows: clamp(68px, 8.5vh, 76px) minmax(0, 1fr) clamp(42px, 6vh, 54px);
        gap: var(--gutter);
      }

      .status-bar {
        min-width: 0;
        display: grid;
        grid-template-columns: minmax(150px, 0.6fr) minmax(190px, 0.75fr) minmax(230px, 1fr) minmax(330px, 1.55fr);
        gap: 1px;
        border-block: 1px solid var(--edge);
        background: rgba(255,255,255,0.02);
        overflow: hidden;
      }

      .identity {
        min-width: 0;
        padding: 7px 13px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-right: 1px solid var(--edge);
        text-align: left;
      }

      h1 {
        margin: 0;
        font-size: clamp(18px, 2vw, 27px);
        line-height: 1;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent);
        text-shadow: 0 0 24px rgba(216, 168, 90, 0.3);
      }

      .identity p {
        margin: 4px 0 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 10.5px;
        font-style: italic;
        color: var(--ink-dim);
        letter-spacing: 0.06em;
      }

      .panel {
        min-width: 0;
        min-height: 0;
        padding: 8px 11px;
        background: var(--panel);
        font-size: clamp(10.5px, 0.82vw, 12.5px);
        line-height: 1.42;
        text-align: left;
        backdrop-filter: blur(4px);
      }

      #clock, #eco-panel, #agent-panel {
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow: hidden;
      }

      #clock { border-right: 1px solid var(--edge); }
      #clock .big { font-size: clamp(16px, 1.6vw, 21px); color: var(--accent); letter-spacing: 0.06em; }
      #eco-panel, #agent-panel { white-space: normal; }

      .workspace {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-columns: 0 minmax(0, 1fr) var(--chronicle-width);
        gap: var(--gutter);
        transition: grid-template-columns 260ms ease;
      }

      .workspace:has(#mind-panel.visible) {
        grid-template-columns: var(--mind-width) minmax(0, 1fr) var(--chronicle-width);
      }

      .world-cell {
        grid-column: 2;
        min-width: 0;
        min-height: 0;
        display: grid;
        place-items: center;
        container-type: size;
      }

      .stage {
        position: relative;
        width: min(100cqw, 100cqh);
        height: min(100cqw, 100cqh);
        overflow: hidden;
        border-radius: 5px;
        box-shadow: 0 0 0 1px var(--edge), 0 0 48px rgba(0, 0, 0, 0.62);
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: inherit;
      }

      /* Adapa's reasoning is a rail beside the world, never over it. */
      #mind-panel {
        grid-column: 1;
        display: none;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-block: 1px solid var(--edge);
        pointer-events: auto;
        font-size: clamp(10px, 0.76vw, 11.5px);
        line-height: 1.32;
      }
      #mind-panel.visible { display: block; }
      #mind-panel .mind-head {
        color: var(--accent);
        letter-spacing: 0.06em;
        margin-bottom: 7px;
      }
      #mind-panel .because {
        color: var(--ink-dim);
        font-style: italic;
        font-size: 11px;
      }
      #mind-panel .section-label {
        margin: clamp(5px, 0.8vh, 9px) 0 3px;
        font-size: 9.5px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink-dim);
        opacity: 0.7;
      }
      .meter { display: grid; grid-template-columns: 60px 1fr; align-items: center; gap: 6px; margin: clamp(1px, 0.28vh, 2px) 0; }
      .meter .lbl { color: var(--ink-dim); }
      .meter .bar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
      .meter .bar > i { display: block; height: 100%; background: #7c9b6e; border-radius: 3px; }
      .meter.dominant .lbl { color: var(--ink); }
      .meter.dominant .bar > i { background: var(--accent); }

      .proj {
        margin: clamp(1px, 0.34vh, 3px) 0;
        padding: clamp(2px, 0.36vh, 3px) 5px;
        border-radius: 3px;
        border-left: 2px solid transparent;
        cursor: default;
      }
      .proj .row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 6px; }
      .proj .pbar { height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; margin-top: 3px; }
      .proj .pbar > i { display: block; height: 100%; background: #6f86a8; border-radius: 3px; }
      .proj .pval { color: var(--ink-dim); font-variant-numeric: tabular-nums; }
      .proj.active { background: rgba(216,168,90,0.12); border-left-color: var(--accent); }
      .proj.active .name { color: var(--accent); }
      .proj.blocked .name { opacity: 0.5; text-decoration: line-through; }
      .proj .terms { display: none; margin-top: 3px; color: var(--ink-dim); font-size: 9.5px; }
      .proj:hover { background: rgba(255,255,255,0.06); }
      .proj:hover .terms { display: block; }

      #tile-info {
        position: absolute;
        bottom: 8px;
        right: 8px;
        max-width: calc(100% - 16px);
        opacity: 0;
        transition: opacity 0.18s;
        pointer-events: none;
      }
      #tile-info.visible { opacity: 1; }

      #chronicle {
        grid-column: 3;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        text-align: left;
        font-size: clamp(10.5px, 0.82vw, 12.5px);
        line-height: 1.42;
        display: flex;
        flex-direction: column;
        gap: clamp(4px, 0.65vh, 7px);
        border-block: 1px solid var(--edge);
      }

      #chronicle .entry {
        flex: 0 0 auto;
        min-width: 0;
        overflow-wrap: anywhere;
        padding: clamp(4px, 0.65vh, 7px) 9px;
        background: var(--panel);
        border-left: 2px solid var(--edge);
        border-radius: 0 4px 4px 0;
        color: var(--ink-dim);
        animation: arrive 0.5s ease-out;
      }

      #chronicle .entry .when {
        display: block;
        font-size: 10.5px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        opacity: 0.6;
      }

      #chronicle .entry.milestone { color: var(--accent); border-left-color: var(--accent); }
      #chronicle .entry.kill { border-left-color: #a85a4a; }
      #chronicle .entry.agent { color: var(--ink); }

      @keyframes arrive {
        from { opacity: 0; transform: translateX(8px); }
        to { opacity: 1; transform: translateX(0); }
      }

      #controls {
        min-width: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: nowrap;
        gap: 8px;
        font-size: 12px;
        border-top: 1px solid var(--edge);
      }

      #controls button {
        font-family: inherit;
        font-size: 12px;
        letter-spacing: 0.08em;
        flex: 0 0 auto;
        padding: 5px clamp(8px, 1vw, 14px);
        background: var(--panel);
        color: var(--ink-dim);
        border: 1px solid var(--edge);
        border-radius: 4px;
        cursor: pointer;
      }

      #controls button:hover { color: var(--ink); }
      #controls button.active { color: var(--accent); border-color: var(--accent); }

      #controls .hint {
        align-self: center;
        color: var(--ink-dim);
        font-style: italic;
        opacity: 0.7;
        margin-left: 6px;
        white-space: nowrap;
      }

      @media (max-width: 1120px) {
        :root { --mind-width: 202px; --chronicle-width: 210px; }
        .status-bar { grid-template-columns: 140px 175px minmax(190px, 0.8fr) minmax(280px, 1.25fr); }
        #clock div:last-child { display: none; }
        #controls { gap: 5px; }
        #controls .hint { display: none; }
      }

      @media (max-width: 860px) {
        :root { --mind-width: 190px; --chronicle-width: 190px; --gutter: 7px; }
        main { grid-template-rows: 54px minmax(0, 1fr) 42px; }
        .identity p, #eco-panel { display: none; }
        .status-bar { grid-template-columns: 130px 170px minmax(240px, 1fr); }
        #clock div:last-child { display: none; }
        #agent-panel div:last-child {
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        #controls button { padding-inline: 7px; font-size: 10.5px; }
      }

      @media (max-height: 680px) {
        main { grid-template-rows: 48px minmax(0, 1fr) 38px; }
        .identity p, #eco-panel br, #agent-panel br { display: none; }
        #clock div:last-child { display: none; }
        #eco-panel div:last-child { display: none; }
        #agent-panel div:last-child {
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .panel { padding-block: 5px; }
        #mind-panel .because { font-size: 9.5px; }
        .proj .pbar { display: none; }
        #chronicle .entry:nth-child(n+7) { display: none; }
        #controls button { padding-block: 3px; }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="status-bar">
        <div class="identity">
          <h1>Sumer</h1>
          <p>first light on the floodplain · one hour is one day</p>
        </div>
        <div class="panel" id="clock"></div>
        <div class="panel" id="eco-panel"></div>
        <div class="panel" id="agent-panel"></div>
      </header>

      <div class="workspace">
        <aside class="panel" id="mind-panel" aria-label="Adapa's mind"></aside>
        <section class="world-cell" aria-label="The floodplain">
          <div class="stage">
            <canvas id="world"></canvas>
            <div class="panel" id="tile-info"></div>
          </div>
        </section>
        <aside id="chronicle" aria-label="Chronicle"></aside>
      </div>

      <div id="controls">
        <button data-speed="1" class="active">1×</button>
        <button data-speed="12">12×</button>
        <button data-speed="60">60×</button>
        <button data-speed="240">240×</button>
        <button id="pause">Pause</button>
        <button id="track-adapa">Find Adapa</button>
        <button id="show-knowledge">Knowledge</button>
        <button id="show-mind">Mind</button>
        <span class="hint">hover the land to read it</span>
      </div>
    </main>

    <script src="js/core.js"></script>
    <script src="js/worldgen.js"></script>
    <script src="js/climate.js"></script>
    <script src="js/flora.js"></script>
    <script src="js/fauna.js"></script>
    <script src="js/agent.js"></script>
    <script src="js/render.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
